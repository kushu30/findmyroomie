<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | FindMyRoomie</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 24px;
        }

        .dash-wrap {
            width: 100%;
            max-width: 580px;
        }

        /* Header */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .dash-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: lowercase;
        }
        .dash-actions {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.1s;
        }
        .btn-edit {
            background: white;
            border: 2px solid #000;
            color: #000;
            box-shadow: 2px 2px 0 #000;
        }
        .btn-edit:hover {
            transform: translate(-1px,-1px);
            box-shadow: 3px 3px 0 #000;
        }
        .btn-logout {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #ef4444;
            box-shadow: 2px 2px 0 #ef4444;
        }
        .btn-logout:hover {
            transform: translate(-1px,-1px);
            box-shadow: 3px 3px 0 #ef4444;
        }

        /* Profile card */
        .profile-card {
            background: #fff;
            border: 2px solid #000;
            box-shadow: 6px 6px 0 #000;
            border-radius: 4px;
            padding: 22px 24px;
            margin-bottom: 28px;
        }
        .profile-greeting {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        .profile-email {
            font-size: 0.82rem;
            color: #52525b;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 16px;
            margin-bottom: 16px;
        }
        .profile-field label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
            margin-bottom: 2px;
        }
        .profile-field span {
            font-size: 0.9rem;
            font-weight: 700;
            color: #111;
        }
        .contact-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f4f4f5;
        }
        .contact-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .contact-pill:hover { opacity: 0.8; }
        .pill-instagram { background:#fdf2f8; color:#db2777; border:1px solid #fbcfe8; }
        .pill-snapchat  { background:#fefce8; color:#a16207; border:1px solid #fef08a; }
        .pill-discord   { background:#eef2ff; color:#4f46e5; border:1px solid #c7d2fe; }
        .pill-phone     { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
        .pill-email     { background:#f9fafb; color:#374151; border:1px solid #e5e7eb; }
        .pill-x         { background:#f9fafb; color:#000;    border:1px solid #e5e7eb; }
        .pill-other     { background:#f5f3ff; color:#7c3aed; border:1px solid #ddd6fe; }
        .pill-icon { width:13px; height:13px; fill:currentColor; flex-shrink:0; }

        /* Roommates section */
        .section-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7280;
            margin-bottom: 12px;
        }
        .roommate-card {
            background: #fff;
            border: 2px solid #000;
            box-shadow: 4px 4px 0 #000;
            border-radius: 4px;
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: all 0.1s;
        }
        .roommate-card:hover {
            transform: translate(-2px,-2px);
            box-shadow: 6px 6px 0 #000;
        }
        .rm-name   { font-size: 1rem; font-weight: 900; letter-spacing: -0.3px; margin-bottom: 3px; }
        .rm-branch { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 10px; }

        /* Empty / loading states */
        .empty-state {
            text-align: center;
            padding: 36px 20px;
            border: 2px dashed #d1d5db;
            border-radius: 4px;
            color: #6b7280;
        }
        .empty-state p { margin: 0; font-weight: 600; font-size: 0.9rem; }
        .empty-state .sub { margin-top: 6px; font-size: 0.8rem; color: #9ca3af; font-weight: 500; }

        .spinner {
            width: 20px; height: 20px;
            border: 2.5px solid #f0f0f0;
            border-top-color: #ef4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .profile-grid { grid-template-columns: 1fr; }
            .yt-card { padding: 20px 16px; margin: 10px; }
            .yt-title { font-size: 1rem; }
            .yt-desc { font-size: 0.8rem; margin-bottom: 16px; }
            .dash-header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .dash-logo { margin-bottom: 4px; }
        }

        /* YouTube Overlay */
        .matches-wrapper {
            position: relative;
            min-height: 250px;
        }
        .yt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            transition: opacity 0.3s ease;
        }
        .yt-card {
            background: #fff;
            border: 2px solid #000;
            box-shadow: 6px 6px 0 #000;
            border-radius: 4px;
            padding: 24px;
            text-align: center;
            max-width: 320px;
            margin: 20px;
        }
        .yt-avatar {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 2px solid #000;
            margin: 0 auto 12px;
            display: block;
            object-fit: cover;
            background: #f4f4f5;
        }
        .yt-title {
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .yt-desc {
            font-size: 0.85rem;
            color: #52525b;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .btn-yt {
            display: block;
            background: #ef4444;
            color: white;
            border: 2px solid #000;
            border-radius: 4px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 3px 3px 0 #000;
            transition: all 0.1s;
            margin-bottom: 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-yt:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 #000;
        }
        .btn-yt-skip {
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-yt-skip:hover { color: #6b7280; }
    </style>
</head>
<body>
<div class="dash-wrap">

    <header class="dash-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="index.html" style="text-decoration: none; color: #52525b; font-weight: 700; font-size: 13px; transition: color 0.15s;" onmouseover="this.style.color='#000'" onmouseout="this.style.color='#52525b'">← Back</a>
            <a href="index.html" class="dash-logo" style="text-decoration: none; color: inherit;">findmyroomie.</a>
        </div>
        <div class="dash-actions">
            <button class="btn-action btn-edit" onclick="window.location.href='form.html'">Edit Profile</button>
            <button class="btn-action btn-logout" onclick="logout()">Log Out</button>
        </div>
    </header>

    <!-- Profile card -->
    <div class="profile-card" id="profileCard">
        <div class="spinner"></div>
        <div style="text-align:center;color:#9ca3af;font-size:0.85rem;">Loading profile...</div>
    </div>

    <!-- Matches -->
    <div class="section-title">Your Roommates</div>
    <div class="matches-wrapper">
        <div class="yt-overlay" id="ytOverlay" style="display: none;">
            <div class="yt-card">
                <!-- Replace 'profile.png' with your actual image file once uploaded to the public/ folder! -->
                <img src="profile.png" alt="Alrightt Ananya" class="yt-avatar" onerror="this.style.display='none'">
                <div class="yt-title">Subscribe to my channel!</div>
                <div class="yt-desc">Campus tours, useful college tips and lots of fun content!</div>
                <a href="https://www.youtube.com/@alrighttananya" target="_blank" rel="noopener noreferrer" class="btn-yt" onclick="dismissYt()">Subscribe & Reveal</a>
                <button class="btn-yt-skip" onclick="dismissYt()">I've already subscribed, show my roommates</button>
            </div>
        </div>
        <div id="matchesContainer">
            <div class="empty-state">
                <div class="spinner"></div>
                <p>Scanning for matches...</p>
            </div>
        </div>
    </div>

</div>

<script src="app.js"></script>
<script>
    checkAuth();

    function dismissYt() {
        const overlay = document.getElementById("ytOverlay");
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 300);
        localStorage.setItem("yt_subscribed", "true");
    }

    // ── Contact icon SVGs ──────────────────────────────────────────────────────
    const ICONS = {
        instagram: `<svg class="pill-icon" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`,
        snapchat:  `<svg class="pill-icon" viewBox="0 0 24 24"><path d="M12.015 2.16c-3.155 0-5.698 2.01-5.698 5.163 0 .805.158 1.464.394 2.01-.225.297-.478.683-.69 1.134a6.764 6.764 0 00-.51 2.222c0 1.258.468 2.128 1.399 2.593.185.093.385.154.58.187l-.027.27a3.528 3.528 0 01-.84.288c-.684.14-1.12.596-1.12 1.182c0 .647.534.982 1.424 1.096.34.043.722.039 1.134-.012l.149-.02a1.646 1.646 0 011.037.234c.484.341 1.05.518 1.636.518h.084c.642 0 1.266-.217 1.769-.613.238-.187.525-.29.82-.294l.113.012c.504.053.987.054 1.445.003.882-.096 1.408-.431 1.408-1.078 0-.585-.436-1.042-1.12-1.182-.284-.058-.57-.156-.84-.288l-.027-.27c.196-.033.395-.094.58-.187.93-.465 1.399-1.335 1.399-2.593 0-.833-.186-1.62-.51-2.222-.213-.451-.465-.837-.69-1.134.236-.546.394-1.205.394-2.01 0-3.153-2.543-5.163-5.698-5.163z"/></svg>`,
        discord:   `<svg class="pill-icon" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0c-.172-.386-.412-.875-.62-1.25a.078.078 0 00-.078-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994.021-.041.001-.09-.041-.106a13.094 13.094 0 01-1.873-.894.077.077 0 01-.008-.128c.126-.093.252-.19.372-.287a.075.075 0 01.077-.011c3.92 1.793 8.18 1.793 12.061 0a.073.073 0 01.078.009c.12.099.246.195.373.289a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.894.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.156 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.156 2.418z"/></svg>`,
        phone:     `<svg class="pill-icon" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>`,
        email:     `<svg class="pill-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>`,
        x:         `<svg class="pill-icon" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
        other:     `<svg class="pill-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>`
    };

    function contactHref(platform, value) {
        if (!value) return null;
        if (platform === "instagram") return `https://instagram.com/${value.replace(/^@/, "")}`;
        if (platform === "snapchat")  return `https://snapchat.com/add/${value.replace(/^@/, "")}`;
        if (platform === "discord")   return null; // Discord has no universal deep link
        if (platform === "phone")     return `https://wa.me/${value.replace(/\D/g, "")}`;
        if (platform === "email")     return `mailto:${value}`;
        if (platform === "x")         return `https://x.com/${value.replace(/^@/, "")}`;
        return null;
    }

    function renderPill(platform, value) {
        const icon  = ICONS[platform] || ICONS.other;
        const href  = contactHref(platform, value);
        const label = platform === "discord" ? `Discord: ${value}` : value;
        const tag   = href ? "a" : "span";
        const attrs = href ? `href="${href}" target="_blank" rel="noopener noreferrer"` : "";
        return `<${tag} class="contact-pill pill-${platform}" ${attrs}>${icon}<span>${label}</span></${tag}>`;
    }

    async function loadDashboard() {
        try {
            // ── Load profile ────────────────────────────────────────────────────
            const userRes  = await fetchWithAuth("/api/me");
            const userData = await userRes.json();
            if (!userData.success) { logout(); return; }

            const u = userData.user;
            if (!u.registered) { window.location.href = "form.html"; return; }

            const contactsHtml = (u.contacts || []).length
                ? u.contacts.map(c => renderPill(c.platform, c.value)).join("")
                : '<span style="color:#9ca3af;font-size:0.8rem;">No contacts added</span>';

            document.getElementById("profileCard").innerHTML = `
                <div class="profile-greeting">Hey, ${u.name}! 👋</div>
                <div class="profile-email">${u.email}</div>
                <div class="profile-grid">
                    <div class="profile-field" style="grid-column:1/-1;"><label>SRM ID</label><span>${u.srmId || "—"}</span></div>
                    <div class="profile-field"><label>Hostel Block</label><span>${u.hostel || "—"}</span></div>
                    <div class="profile-field"><label>Room No.</label><span>${u.room || "—"}</span></div>
                    <div class="profile-field" style="grid-column:1/-1;"><label>Branch</label><span>${u.branch || "—"}</span></div>
                </div>
                <div><label style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:#9ca3af;">Your Contacts</label>
                <div class="contact-pills">${contactsHtml}</div></div>
            `;

            // ── Load roommates ──────────────────────────────────────────────────
            const rmRes  = await fetchWithAuth("/api/roommates");
            const rmData = await rmRes.json();
            const box    = document.getElementById("matchesContainer");

            if (rmData.success && rmData.roommates?.length) {
                box.innerHTML = rmData.roommates.map(rm => {
                    const defaultEmailPill = renderPill("email", rm.email);
                    
                    // Filter out the default email from the contacts list to prevent duplicates
                    const otherContacts = (rm.contacts || []).filter(c => 
                        !(c.platform === "email" && c.value.toLowerCase() === rm.email.toLowerCase())
                    );
                    
                    const otherPills = otherContacts.map(c => renderPill(c.platform, c.value)).join("");
                    const pills = defaultEmailPill + otherPills;
                    
                    const emptyNote = (rm.contacts || []).length === 0 
                        ? '<div style="margin-top: 10px; font-size: 0.75rem; color: #f59e0b; font-weight: 700;">Only default email available. Reach out and tell them to add more contacts!</div>' 
                        : '';

                    const branchText = rm.srmId ? `${rm.branch} • ${rm.srmId}` : rm.branch;

                    return `
                        <div class="roommate-card">
                            <div class="rm-name">${rm.name}</div>
                            <div class="rm-branch">${branchText}</div>
                            <div class="contact-pills">${pills}</div>
                            ${emptyNote}
                        </div>`;
                }).join("");
                
                // Show YT Overlay if they haven't dismissed it yet and there are actually matches to hide
                if (!localStorage.getItem("yt_subscribed")) {
                    document.getElementById("ytOverlay").style.display = "flex";
                }
            } else {
                box.innerHTML = `
                    <div class="empty-state">
                        <p>No roommates yet in your room.</p>
                        <p class="sub">Matches appear automatically once your roomies register!</p>
                    </div>`;
            }
        } catch (err) {
            console.error("Dashboard load error:", err);
            document.getElementById("profileCard").innerHTML =
                `<div style="color:#ef4444;text-align:center;font-weight:700;">
                    Failed to load profile. <button onclick="logout()" style="background:none;border:none;cursor:pointer;text-decoration:underline;color:#ef4444;">Log in again</button>
                </div>`;
        }
    }

    loadDashboard();
</script>
</body>
</html>
