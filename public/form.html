<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FindMyRoomie</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 30px 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Contact fields */
        #contactsContainer {
            margin-bottom: 4px;
        }
        .contact-entry {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            animation: fadeSlideIn 0.2s ease-out;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .contact-label {
            text-transform: capitalize;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #374151;
            min-width: 82px;
        }
        .contact-input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: border-color 0.15s;
        }
        .contact-input:focus {
            border-color: #000;
        }
        .remove-btn {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            font-family: inherit;
        }
        .remove-btn:hover {
            background: #fecaca;
        }

        /* Platform buttons */
        .add-contact-section {
            background: #f9fafb;
            border: 2px dashed #d1d5db;
            border-radius: 4px;
            padding: 14px;
            margin-bottom: 20px;
        }
        .add-contact-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            margin-bottom: 10px;
        }
        .platform-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .platform-btn {
            background: white;
            border: 1.5px solid #d1d5db;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            color: #374151;
        }
        .platform-btn:hover {
            border-color: #000;
            background: #f4f4f5;
        }

        /* Cancel button */
        .form-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .cancel-btn {
            background: white;
            border: 1.5px solid #d1d5db;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            color: #374151;
            transition: all 0.15s;
            text-decoration: none;
            display: none;
        }
        .cancel-btn:hover {
            border-color: #000;
            background: #f4f4f5;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header-row">
            <div>
                <h1 style="font-size: 24px; font-weight: 900; letter-spacing: -1.5px; text-transform: lowercase; margin-bottom: 4px;">findmyroomie.</h1>
                <span class="form-badge" id="formBadge">Registration</span>
            </div>
            <button type="button" class="cancel-btn" id="cancelBtn" onclick="window.location.href='dashboard.html'">← Dashboard</button>
        </div>

        <form id="roomieForm" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="email">SRM Email</label>
                <input type="email" id="email" name="email" readonly
                       style="background: #f4f4f5; cursor: not-allowed; color: #52525b; border-color: #d1d5db;">
            </div>

            <div class="form-group">
                <label for="branchSelect">Branch</label>
                <select id="branchSelect" required>
                    <option value="" disabled selected>Select your branch</option>
                </select>
                <input type="text" id="customBranch" placeholder="Type branch name in CAPS"
                       style="display:none; margin-top:8px;" autocomplete="off">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="hostelType">Hostel Type</label>
                    <select id="hostelType" required>
                        <option value="" disabled selected>Type</option>
                        <option value="boys">Boys</option>
                        <option value="girls">Girls</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="room">Room No.</label>
                    <input type="text" id="room" name="room" placeholder="e.g. 101" required autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label for="hostel">Hostel Block</label>
                <select id="hostel" required>
                    <option value="">Select hostel type first</option>
                </select>
            </div>

            <!-- Contacts -->
            <label style="display:block; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-top:16px; margin-bottom:8px;">
                Contact Details
            </label>
            <div id="contactsContainer"></div>

            <div class="add-contact-section">
                <div class="add-contact-label">Add a contact platform</div>
                <div class="platform-btns">
                    <button type="button" class="platform-btn" onclick="addContact('instagram')">+ Instagram</button>
                    <button type="button" class="platform-btn" onclick="addContact('snapchat')">+ Snapchat</button>
                    <button type="button" class="platform-btn" onclick="addContact('discord')">+ Discord</button>
                    <button type="button" class="platform-btn" onclick="addContact('phone')">+ Phone / WhatsApp</button>
                    <button type="button" class="platform-btn" onclick="addContact('email')">+ Email</button>
                    <button type="button" class="platform-btn" onclick="addContact('x')">+ X (Twitter)</button>
                    <button type="button" class="platform-btn" onclick="addContact('other')">+ Other</button>
                </div>
            </div>

            <button type="submit" id="submitBtn">Save Profile</button>
            <div class="loader" id="loader">Saving...</div>
        </form>

        <p id="statusMsg" style="margin-top:12px; text-align:center; font-weight:700; font-size:13px; display:none;"></p>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const HOSTELS = {
            girls: [
                "Kopperundevi: AC with attached washroom - 2 sharing",
                "Kopperundevi: Non-AC with attached washroom - 2 sharing",
                "ESQ A: Non-AC with attached washroom - 2 sharing",
                "ESQ A: Non-AC with attached washroom - 3 sharing",
                "ESQ A: Non-AC with attached washroom - 4 sharing",
                "ESQ B: Non-AC with attached washroom - 2 sharing",
                "ESQ B: Non-AC with attached washroom - 3 sharing",
                "Sannasi C: AC with attached washroom - 3 sharing",
                "Sannasi C: Non-AC with attached washroom - 3 sharing",
                "Malligai: Non-AC with common washroom - 2 sharing",
                "Senbagam: Non-AC with common washroom - 3 sharing",
                "Senbagam: Non-AC with common washroom - 6 sharing"
            ],
            boys: [
                "Premium Boys: AC with attached washroom - 3 sharing",
                "Green Pearl (Off-Campus): AC with attached washroom - 3 sharing",
                "Green Pearl (Off-Campus): Non-AC with attached washroom - 3 sharing",
                "Nelson Mandela: AC with attached washroom - 3 sharing",
                "Agasthiyar: AC with attached washroom - 4 sharing",
                "Sannasi A: AC with attached washroom - 3 sharing",
                "Sannasi A: Non-AC with attached washroom - 3 sharing",
                "Began: AC with common washroom - 3 sharing",
                "Oori: AC with common washroom - 4 & 5 sharing",
                "Manoranjitham: Non-AC with common washroom - 3 sharing",
                "Kaari: Non-AC with common washroom - 4 & 5 sharing",
                "Paari: Non-AC with common washroom - 4 & 5 sharing"
            ]
        };

        const BRANCHES = [
            "AERONAUTICAL ENGINEERING","AEROSPACE ENGINEERING","ARCHITECTURE",
            "ARTIFICIAL INTELLIGENCE","AUTOMATION AND ROBOTICS",
            "AUTOMOBILE ENGINEERING","AUTOMOBILE ENGINEERING (AUTOMOTIVE ELECTRONICS)",
            "BIOMEDICAL ENGINEERING","BIOMEDICAL ENGINEERING (MACHINE INTELLIGENCE)",
            "BIOTECHNOLOGY","BIOTECHNOLOGY (COMPUTATIONAL BIOLOGY)",
            "BIOTECHNOLOGY (FOOD TECHNOLOGY)","BIOTECHNOLOGY (GENETIC ENGINEERING)",
            "BIOTECHNOLOGY (REGENERATIVE MEDICINE)","CHEMICAL ENGINEERING",
            "CIVIL ENGINEERING","CIVIL ENGINEERING (COMPUTER APPLICATIONS)",
            "COMPUTER SCIENCE AND BUSINESS SYSTEM",
            "COMPUTER SCIENCE AND ENGINEERING",
            "COMPUTER SCIENCE AND ENGINEERING (AIML)",
            "COMPUTER SCIENCE AND ENGINEERING (BIG DATA ANALYTICS)",
            "COMPUTER SCIENCE AND ENGINEERING (BLOCKCHAIN TECHNOLOGY)",
            "COMPUTER SCIENCE AND ENGINEERING (CLOUD COMPUTING)",
            "COMPUTER SCIENCE AND ENGINEERING (CYBER SECURITY)",
            "COMPUTER SCIENCE AND ENGINEERING (DATA SCIENCE)",
            "COMPUTER SCIENCE AND ENGINEERING (DEVSECOPS)",
            "COMPUTER SCIENCE AND ENGINEERING (GAMING TECHNOLOGY)",
            "COMPUTER SCIENCE AND ENGINEERING (INFORMATION TECHNOLOGY)",
            "COMPUTER SCIENCE AND ENGINEERING (IOT)",
            "COMPUTER SCIENCE AND ENGINEERING (SOFTWARE ENGINEERING)",
            "ELECTRICAL AND ELECTRONICS ENGINEERING",
            "ELECTRONICS AND COMMUNICATION ENGINEERING",
            "ELECTRONICS AND COMMUNICATION ENGINEERING (CYBER PHYSICAL SYSTEMS)",
            "ELECTRONICS AND COMMUNICATION ENGINEERING (DATA SCIENCE)",
            "ELECTRONICS AND COMPUTER ENGINEERING",
            "ELECTRONICS AND INSTRUMENTATION ENGINEERING",
            "ELECTRONICS ENGINEERING (VLSI DESIGN AND TECHNOLOGY)",
            "INTERIOR DESIGN","MATHEMATICS AND COMPUTING",
            "MECHANICAL ENGINEERING",
            "MECHANICAL ENGINEERING (AUTOMATION AND ROBOTICS)",
            "MECHANICAL ENGINEERING (ARTIFICIAL INTELLIGENCE AND MACHINE LEARNING)",
            "MECHATRONICS ENGINEERING","MECHATRONICS ENGINEERING (ROBOTICS)",
            "NANOTECHNOLOGY","OTHER"
        ];

        const placeholders = {
            instagram: "@your.handle",
            snapchat: "username",
            discord: "username or user#1234",
            phone: "+91 XXXXX XXXXX",
            email: "you@example.com",
            x: "@handle",
            other: "contact info"
        };

        // Populate branch dropdown
        const branchSelect   = document.getElementById("branchSelect");
        const customBranch   = document.getElementById("customBranch");
        const hostelType     = document.getElementById("hostelType");
        const hostelDropdown = document.getElementById("hostel");
        const contactsContainer = document.getElementById("contactsContainer");
        const statusMsg      = document.getElementById("statusMsg");
        const loader         = document.getElementById("loader");
        const submitBtn      = document.getElementById("submitBtn");

        BRANCHES.forEach(b => branchSelect.appendChild(new Option(b, b)));

        branchSelect.onchange = () => {
            const isOther = branchSelect.value === "OTHER";
            customBranch.style.display = isOther ? "block" : "none";
            customBranch.required = isOther;
        };

        hostelType.onchange = () => {
            const prev = hostelDropdown.value;
            hostelDropdown.innerHTML = `<option value="">Select block</option>`;
            (HOSTELS[hostelType.value] || []).forEach(h => hostelDropdown.appendChild(new Option(h, h)));
            // Restore selection if still valid
            if (HOSTELS[hostelType.value]?.includes(prev)) hostelDropdown.value = prev;
        };

        // Add a contact row
        function addContact(platform, value = "") {
            // Allow only one of each type except "other"
            if (platform !== "other") {
                const existing = contactsContainer.querySelector(`[data-platform="${platform}"]`);
                if (existing) {
                    existing.querySelector(".contact-input").focus();
                    return;
                }
            }

            const row = document.createElement("div");
            row.className = "contact-entry";
            row.setAttribute("data-platform", platform);

            const label = document.createElement("span");
            label.className = "contact-label";
            label.textContent = platform === "phone" ? "Phone" : platform.charAt(0).toUpperCase() + platform.slice(1);

            const input = document.createElement("input");
            input.type = "text";
            input.className = "contact-input";
            input.placeholder = placeholders[platform] || "username";
            input.value = value;
            input.setAttribute("autocomplete", "off");

            const removeBtn = document.createElement("button");
            removeBtn.type = "button";
            removeBtn.className = "remove-btn";
            removeBtn.textContent = "Remove";
            removeBtn.onclick = () => row.remove();

            row.appendChild(label);
            row.appendChild(input);
            row.appendChild(removeBtn);
            contactsContainer.appendChild(row);
            input.focus();
        }

        function showStatus(msg, isError = true) {
            statusMsg.textContent = msg;
            statusMsg.style.color = isError ? "#ef4444" : "#16a34a";
            statusMsg.style.display = "block";
        }

        // Prefill from server
        async function loadProfile() {
            try {
                const res  = await fetchWithAuth("/api/me");
                const data = await res.json();
                if (!data.success) { logout(); return; }

                const user = data.user;
                document.getElementById("name").value  = user.name  || "";
                document.getElementById("email").value = user.email || "";

                if (user.registered) {
                    document.getElementById("formBadge").textContent = "Edit Profile";
                    submitBtn.textContent = "Save Changes";
                    document.getElementById("cancelBtn").style.display = "block";

                    // Branch
                    if (BRANCHES.includes(user.branch)) {
                        branchSelect.value = user.branch;
                    } else if (user.branch) {
                        branchSelect.value = "OTHER";
                        customBranch.value = user.branch;
                        customBranch.style.display = "block";
                        customBranch.required = true;
                    }

                    // Hostel
                    if (user.hostelType) {
                        hostelType.value = user.hostelType;
                        hostelType.onchange(); // populate hostel list
                    }
                    if (user.hostel) hostelDropdown.value = user.hostel;
                    if (user.room)  document.getElementById("room").value = user.room;

                    // Contacts
                    if (user.contacts?.length) {
                        user.contacts.forEach(c => addContact(c.platform, c.value));
                    }
                } else {
                    // New user — prefill email contact automatically
                    if (user.email) addContact("email", user.email);
                }
            } catch (err) {
                console.error("Load profile error:", err);
            }
        }

        // Form submit
        document.getElementById("roomieForm").onsubmit = async (e) => {
            e.preventDefault();
            statusMsg.style.display = "none";

            const name     = document.getElementById("name").value.trim();
            const branch   = branchSelect.value === "OTHER"
                           ? (customBranch.value.trim().toUpperCase() || "")
                           : branchSelect.value;
            const hType    = hostelType.value;
            const hostel   = hostelDropdown.value;
            const room     = document.getElementById("room").value.trim();

            // Front-end validation
            if (!name)   { showStatus("Please enter your name."); return; }
            if (!branch) { showStatus("Please select your branch."); return; }
            if (!hType)  { showStatus("Please select hostel type (Boys/Girls)."); return; }
            if (!hostel) { showStatus("Please select your hostel block."); return; }
            if (!room)   { showStatus("Please enter your room number."); return; }

            // Gather contacts (skip empty)
            const contacts = [];
            let contactError = null;

            document.querySelectorAll(".contact-entry").forEach(row => {
                const platform = row.getAttribute("data-platform");
                const val      = row.querySelector(".contact-input").value.trim();
                if (!val) return; // skip blank entries

                if (platform === "phone") {
                    const digits = val.replace(/\D/g, "");
                    if (digits.length < 10) {
                        contactError = "Phone number must have at least 10 digits.";
                    }
                }
                if (platform === "email" && !val.includes("@")) {
                    contactError = "Please enter a valid email address.";
                }
                contacts.push({ platform, value: val });
            });

            if (contactError) { showStatus(contactError); return; }

            loader.style.display = "block";
            submitBtn.disabled = true;

            try {
                const res = await fetchWithAuth("/api/register", {
                    method: "POST",
                    body: JSON.stringify({ name, branch, hostelType: hType, hostel, room, contacts })
                });
                const result = await res.json();
                loader.style.display = "none";

                if (res.ok && result.success) {
                    window.location.href = "dashboard.html";
                } else {
                    showStatus(result.message || "Something went wrong. Please try again.");
                    submitBtn.disabled = false;
                }
            } catch {
                loader.style.display = "none";
                showStatus("Network error. Please try again.");
                submitBtn.disabled = false;
            }
        };

        loadProfile();
    </script>
</body>
</html>
